services:
  postgres:
    image: postgres:17-alpine
    container_name: paybridge-postgres
    environment:
      POSTGRES_DB: paybridge
      POSTGRES_USER: paybridge
      POSTGRES_PASSWORD: paybridge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paybridge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paybridge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.5
    container_name: paybridge-dashboard
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    ports:
      - "18888:18888" # Dashboard UI
      - "4317:18889" # OTLP/gRPC (apps inside the network use this)

  fraud-stub:
    build:
      context: .
      dockerfile: src/PayBridge.FraudStub/Dockerfile
    container_name: paybridge-fraud-stub
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - ASPNETCORE_Kestrel__EndpointDefaults__Protocols=Http2
    ports:
      - "5002:8080"
    depends_on:
      aspire-dashboard:
        condition: service_started

  payment-api:
    build:
      context: .
      dockerfile: src/PayBridge.PaymentApi/Dockerfile
    container_name: paybridge-payment-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=paybridge;Username=paybridge;Password=paybridge_dev
      - ConnectionStrings__Redis=redis:6379
      - Services__FraudStub__BaseUrl=http://fraud-stub:8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aspire-dashboard:18889
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fraud-stub:
        condition: service_started
      aspire-dashboard:
        condition: service_started

volumes:
  postgres-data:
