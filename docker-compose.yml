services:
  postgres:
    image: postgres:17-alpine
    container_name: paybridge-postgres
    environment:
      POSTGRES_DB: paybridge
      POSTGRES_USER: paybridge
      POSTGRES_PASSWORD: paybridge_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paybridge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paybridge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: paybridge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.5
    container_name: paybridge-dashboard
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
    ports:
      - "18888:18888"
      - "4317:18889"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    container_name: paybridge-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4319:4317" # OTLP gRPC (external apps could also send here)
      - "4320:4318" # OTLP HTTP
    depends_on:
      aspire-dashboard:
        condition: service_started

  fraud-stub:
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/PayBridge.FraudStub/Dockerfile
    container_name: paybridge-fraud-stub
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - ASPNETCORE_Kestrel__EndpointDefaults__Protocols=Http2
    ports:
      - "5002:8080"
    depends_on:
      otel-collector:
        condition: service_started
      aspire-dashboard:
        condition: service_started

  provider-stub:
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/PayBridge.ProviderStub/Dockerfile
    container_name: paybridge-provider-stub
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    ports:
      - "5003:8080"
    depends_on:
      otel-collector:
        condition: service_started
      aspire-dashboard:
        condition: service_started

  payment-api:
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/PayBridge.PaymentApi/Dockerfile
    container_name: paybridge-payment-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=paybridge;Username=paybridge;Password=paybridge_dev
      - ConnectionStrings__Redis=redis:6379
      - Services__FraudStub__BaseUrl=http://fraud-stub:8080
      - Services__Provider__BaseUrl=http://provider-stub:8080
      - WebhookBaseUrl=http://payment-api:8080
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__User=guest
      - RabbitMq__Password=guest
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      fraud-stub:
        condition: service_started
      provider-stub:
        condition: service_started
      otel-collector:
        condition: service_started
      aspire-dashboard:
        condition: service_started

  settlement-consumer:
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/PayBridge.SettlementConsumer/Dockerfile
    container_name: paybridge-settlement-consumer
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=paybridge;Username=paybridge;Password=paybridge_dev
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__User=guest
      - RabbitMq__Password=guest
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      aspire-dashboard:
        condition: service_started

volumes:
  postgres-data:
